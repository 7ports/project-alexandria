name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'guides/**'
      - 'scripts/build-embedding-map.mjs'
      - 'docs/data/**'
      - 'mcp-server/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: write   # needed to push the README + embedding-map sync commit
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Build + commit refreshed artifacts + publish Pages only on pushes to main.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          # Copy guide markdown files into docs/guides/ so they are deployed
          mkdir -p docs/guides
          cp guides/*.md docs/guides/

          # Generate a JSON manifest with name, title, and description for each guide
          python3 .github/gen_manifest.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install build dependencies
        working-directory: mcp-server
        run: npm install

      - name: Restore embedding model cache
        uses: actions/cache@v4
        with:
          path: mcp-server/.models
          key: embeddings-bge-small-en-v1.5-cache

      - name: Rebuild sqlite-vec knowledge index from guides
        # The reducer reads mcp-server/.index/knowledge.db, which is gitignored and
        # absent on a fresh checkout. Rebuild it from guides/ (downloads the bge-small
        # model on a cache miss) so the 3D map reflects the current guide set.
        run: |
          node -e "const idx=require('./mcp-server/lib/index-store'); const {reindexAll}=require('./mcp-server/lib/reindex'); (async()=>{const s=idx.openIndex(); const r=await reindexAll(s,{force:true}); console.log('reindexed '+JSON.stringify(r)); idx.close(s);})().catch(e=>{console.error(e);process.exit(1);});"

      - name: Regenerate 3D embedding map
        run: node scripts/build-embedding-map.mjs

      - name: Commit updated README and embedding map
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # Stage the manifest-synced README and the regenerated visualizer artifacts.
          # docs/data/* comes from build-embedding-map.mjs run against the freshly
          # rebuilt index, so newly added guides appear in the map served by Pages.
          git add README.md docs/data/embedding-map.json docs/data/guide-vectors.bin docs/data/chunk-vectors.bin

          # Only commit when something actually changed. The [skip ci] tag prevents
          # this push from retriggering the workflow (infinite-loop guard).
          git diff --cached --quiet || (
            git commit -m "docs: sync README + embedding map [skip ci]" &&
            git push
          )

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  embedding-drift-check:
    # PR guard: fail when guides change but the committed docs/data/* artifacts
    # were not regenerated. Mirrors how a stale manifest would be caught.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install build dependencies
        working-directory: mcp-server
        run: npm install

      - name: Restore embedding model cache
        uses: actions/cache@v4
        with:
          path: mcp-server/.models
          key: embeddings-bge-small-en-v1.5-cache

      - name: Rebuild sqlite-vec knowledge index from guides
        run: |
          node -e "const idx=require('./mcp-server/lib/index-store'); const {reindexAll}=require('./mcp-server/lib/reindex'); (async()=>{const s=idx.openIndex(); const r=await reindexAll(s,{force:true}); console.log('reindexed '+JSON.stringify(r)); idx.close(s);})().catch(e=>{console.error(e);process.exit(1);});"

      - name: Check embedding map is up to date
        # Exits non-zero if committed docs/data/* differ from a fresh build —
        # i.e. a PR edited guides without regenerating the visualizer artifacts.
        run: node scripts/build-embedding-map.mjs --check
