name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          # Copy guide markdown files into docs/guides/ so they are deployed
          mkdir -p docs/guides
          cp guides/*.md docs/guides/

          # Generate a JSON manifest with name, title, and description for each guide
          python3 - <<'EOF'
import json, re, os

guides_dir = 'guides'
entries = []
for fname in sorted(os.listdir(guides_dir)):
    if not fname.endswith('.md'):
        continue
    name = fname[:-3]
    with open(os.path.join(guides_dir, fname), encoding='utf-8') as f:
        content = f.read()
    # Extract title from first # heading
    m = re.search(r'^# (.+)', content, re.MULTILINE)
    title = m.group(1).strip() if m else name
    # Extract description: first plain-text line after ## Overview
    m2 = re.search(r'^## Overview\s*\n+((?:[A-Za-z\[]).+)', content, re.MULTILINE)
    desc = m2.group(1).strip()[:150] if m2 else ''
    entries.append({'name': name, 'title': title, 'description': desc})

with open('docs/guides/manifest.json', 'w', encoding='utf-8') as f:
    json.dump(entries, f, indent=2, ensure_ascii=False)
print(f'Generated manifest with {len(entries)} guides')
EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
