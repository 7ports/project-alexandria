    <path d="M6 26 L16 6 L26 26"/>
    <path d="M10 19 L22 19"/>
  </g>
  <!-- FRONT: upright chevron (A) — prominent duotone. -->
  <g fill="none" stroke="url(#alexFav)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 26 L16 6 L26 26"/>
    <path d="M10 19 L22 19"/>
  </g>
  <circle cx="16" cy="6" r="3" fill="url(#alexFav)"/>
