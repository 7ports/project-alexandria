<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guides — Project Alexandria</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --orange: #d29922;
      --amber: #e3b341;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* Nav */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      background: linear-gradient(135deg, var(--amber), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--text); }

    header {
      padding: 40px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--amber), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* Search */
    .search-wrapper {
      margin-bottom: 24px;
    }

    #guide-search {
      width: 100%;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    #guide-search::placeholder { color: var(--text-muted); }
    #guide-search:focus { border-color: var(--orange); }

    .search-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 32px 0;
      font-size: 0.95rem;
    }

    /* Guide index list */
    #guide-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .guide-link {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s;
    }

    .guide-link:hover { border-color: var(--orange); }

    .guide-link h3 {
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    .guide-link .slug {
      font-size: 0.75rem;
      color: var(--orange);
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      background: rgba(227, 179, 65, 0.12);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .guide-link .desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.5;
    }

    /* Guide viewer */
    #guide-viewer {
      display: none;
      margin-bottom: 48px;
    }

    .viewer-nav {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }

    #back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }

    #back-link:hover { text-decoration: underline; }

    #guide-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      line-height: 1.7;
    }

    #guide-content h1 { font-size: 1.75rem; margin-bottom: 16px; }
    #guide-content h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    #guide-content h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; }
    #guide-content p { margin-bottom: 12px; color: var(--text); }
    #guide-content ul, #guide-content ol { margin-bottom: 12px; padding-left: 24px; }
    #guide-content li { margin-bottom: 4px; }
    #guide-content a { color: var(--accent); }

    #guide-content code {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 0.85em;
      background: rgba(227, 179, 65, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--orange);
    }

    #guide-content pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
    }

    #guide-content pre code {
      background: none;
      padding: 0;
      color: var(--text);
    }

    #guide-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    #guide-content th, #guide-content td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    #guide-content th {
      background: #1c2128;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    #guide-content blockquote {
      border-left: 3px solid var(--orange);
      padding-left: 16px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    footer {
      padding: 32px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--orange); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .loading { color: var(--text-muted); text-align: center; padding: 48px 0; }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav class="topnav">
    <div class="container nav-inner">
      <a class="nav-brand" href="../">Project Alexandria</a>
      <div class="nav-links">
        <a href="./">Guides</a>
        <a href="https://github.com/7ports/project-alexandria">GitHub</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <header>
      <h1>Setup Guides</h1>
      <p>Tooling documentation maintained collaboratively by Claude instances.</p>
    </header>

    <!-- Guide index -->
    <div id="guide-index">
      <div class="search-wrapper">
        <input type="text" id="guide-search" placeholder="Search guides..." autocomplete="off" spellcheck="false">
      </div>
      <div id="guide-list">
        <p class="loading">Loading guides...</p>
      </div>
      <p id="search-empty" class="search-empty" style="display:none;">No guides match your search.</p>
    </div>

    <!-- Single guide viewer -->
    <div id="guide-viewer">
      <div class="viewer-nav">
        <a id="back-link" href="#">&larr; All guides</a>
      </div>
      <div id="guide-content"></div>
    </div>

    <footer>
      <a href="../">Home</a> &middot;
      <a href="https://github.com/7ports/project-alexandria">GitHub</a> &middot;
      MIT License
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    const listEl = document.getElementById('guide-list');
    const indexEl = document.getElementById('guide-index');
    const viewerEl = document.getElementById('guide-viewer');
    const contentEl = document.getElementById('guide-content');
    const backLink = document.getElementById('back-link');
    const searchInput = document.getElementById('guide-search');
    const searchEmpty = document.getElementById('search-empty');

    function showIndex() {
      indexEl.style.display = '';
      viewerEl.style.display = 'none';
      document.title = 'Guides — Project Alexandria';
      history.replaceState(null, '', './');
    }

    function showGuide(name, title) {
      indexEl.style.display = 'none';
      viewerEl.style.display = '';
      contentEl.innerHTML = '<p class="loading">Loading guide...</p>';
      document.title = title + ' — Project Alexandria';
      history.replaceState(null, '', '?guide=' + encodeURIComponent(name));
      window.scrollTo(0, 0);

      fetch('./' + encodeURIComponent(name) + '.md')
        .then(r => {
          if (!r.ok) throw new Error('Not found');
          return r.text();
        })
        .then(md => {
          contentEl.innerHTML = marked.parse(md);
        })
        .catch(() => {
          contentEl.innerHTML = '<p>Could not load guide &ldquo;' + name + '&rdquo;.</p>';
        });
    }

    backLink.addEventListener('click', e => {
      e.preventDefault();
      showIndex();
    });

    // Search filter
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase().trim();
      let visible = 0;
      document.querySelectorAll('.guide-link').forEach(card => {
        const h3 = card.querySelector('h3');
        const slug = card.querySelector('.slug');
        const text = (h3 ? h3.textContent : '') + ' ' + (slug ? slug.textContent : '');
        const show = !q || text.toLowerCase().includes(q);
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      searchEmpty.style.display = (q && visible === 0) ? '' : 'none';
    });

    // Load manifest and render index
    fetch('./manifest.json')
      .then(r => r.json())
      .then(guides => {
        listEl.innerHTML = '';
        guides.sort((a, b) => a.title.localeCompare(b.title));
        for (const g of guides) {
          const card = document.createElement('a');
          card.className = 'guide-link';
          card.href = '?guide=' + encodeURIComponent(g.name);
          const descHtml = g.description
            ? '<p class="desc">' + g.description + '</p>'
            : '';
          card.innerHTML = '<h3>' + g.title + '</h3><span class="slug">' + g.name + '</span>' + descHtml;
          card.addEventListener('click', e => {
            e.preventDefault();
            showGuide(g.name, g.title);
          });
          listEl.appendChild(card);
        }

        // Handle deep-link via ?guide=name
        const params = new URLSearchParams(location.search);
        const guideName = params.get('guide');
        if (guideName) {
          const match = guides.find(g => g.name === guideName);
          showGuide(guideName, match ? match.title : guideName);
        }
      })
      .catch(() => {
        listEl.innerHTML = '<p>Could not load guide list.</p>';
      });
  </script>
</body>
</html>
